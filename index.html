<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bot 开发流程 Demo - 多任务并行版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .demo-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .user-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .avatar-dev { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .avatar-test { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .avatar-deploy { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }

        .user-info h3 {
            font-size: 18px;
            color: #333;
        }

        .user-info p {
            font-size: 13px;
            color: #666;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .task-item {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #ddd;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item.pending { border-left-color: #ffc107; }
        .task-item.inprogress { border-left-color: #2196f3; background: #e3f2fd; }
        .task-item.completed { border-left-color: #4caf50; background: #e8f5e9; }

        .task-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .task-desc {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .task-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-inprogress { background: #cce5ff; color: #004085; }
        .status-completed { background: #d4edda; color: #155724; }

        .controls {
            display: flex;
            gap: 8px;
        }

        .controls button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .btn-start {
            background: #667eea;
            color: white;
        }

        .btn-reset {
            background: #e0e0e0;
            color: #666;
        }

        .timeline {
            margin-top: 20px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: 400px;
            overflow-y: auto;
        }

        .timeline h3 {
            color: #667eea;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .timeline-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
        }

        .timeline-time {
            color: #999;
            min-width: 60px;
            font-weight: 600;
        }

        .timeline-event {
            color: #333;
        }

        .timeline-role {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 6px;
        }

        .role-dev { background: #e8eaf6; color: #667eea; }
        .role-bot { background: #f3e5f5; color: #ab47bc; }
        .role-test { background: #fce4ec; color: #e91e63; }
        .role-deploy { background: #e0f7fa; color: #00acc1; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Bot 驱动的多任务并行开发流程</h1>
        <p>演示：开发者A、测试工程师B、发布人员C 的协同工作</p>
    </div>

    <div class="demo-container">
        <!-- 开发者A面板 -->
        <div class="user-panel">
            <div class="user-header">
                <div class="user-avatar avatar-dev">A</div>
                <div class="user-info">
                    <h3>开发者 小A</h3>
                    <p>负责编码和技术规范</p>
                </div>
            </div>
            <div class="task-list" id="devTasks">
                <!-- 任务将动态添加 -->
            </div>
        </div>

        <!-- 测试工程师B面板 -->
        <div class="user-panel">
            <div class="user-header">
                <div class="user-avatar avatar-test">B</div>
                <div class="user-info">
                    <h3>测试工程师 小B</h3>
                    <p>负责测试用例和质量保证</p>
                </div>
            </div>
            <div class="task-list" id="testTasks">
                <!-- 任务将动态添加 -->
            </div>
        </div>

        <!-- 发布人员C面板 -->
        <div class="user-panel">
            <div class="user-header">
                <div class="user-avatar avatar-deploy">C</div>
                <div class="user-info">
                    <h3>发布人员 小C</h3>
                    <p>负责生产环境部署</p>
                </div>
            </div>
            <div class="task-list" id="deployTasks">
                <!-- 任务将动态添加 -->
            </div>
        </div>
    </div>

    <div class="controls" style="max-width: 1600px; margin: 20px auto;">
        <button class="btn-start" onclick="startDemo()">开始演示</button>
        <button class="btn-reset" onclick="resetDemo()">重置</button>
    </div>

    <div class="timeline" style="max-width: 1600px; margin: 0 auto;">
        <h3>📋 时间线（多任务并行）</h3>
        <div id="timeline"></div>
    </div>

    <script>
        let demoRunning = false;

        function addTask(panel, content, status = 'pending') {
            const container = document.getElementById(panel + 'Tasks');
            const task = document.createElement('div');
            task.className = `task-item ${status}`;
            task.innerHTML = content;
            container.appendChild(task);
        }

        function updateTask(panel, index, content, status) {
            const container = document.getElementById(panel + 'Tasks');
            const tasks = container.children;
            if (tasks[index]) {
                tasks[index].className = `task-item ${status}`;
                tasks[index].innerHTML = content;
            }
        }

        function addTimeline(role, event) {
            const timeline = document.getElementById('timeline');
            const now = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const item = document.createElement('div');
            item.className = 'timeline-item';
            item.innerHTML = `
                <span class="timeline-time">${now}</span>
                <span class="timeline-event">
                    <span class="timeline-role role-${role}">${role === 'dev' ? '开发者A' : role === 'bot' ? 'Bot' : role === 'test' ? '测试B' : '发布C'}</span>
                    ${event}
                </span>
            `;
            timeline.appendChild(item);
            timeline.scrollTop = timeline.scrollHeight;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function runWorkflow() {
            // 初始化：展示三个待办任务
            addTimeline('dev', '登录查看今日任务');
            
            addTask('dev', `
                <div class="task-title">JIRA-1234: 用户登录优化</div>
                <div class="task-desc">优化登录流程，提升用户体验</div>
                <span class="task-status status-pending">待开始</span>
            `, 'pending');

            addTask('dev', `
                <div class="task-title">JIRA-1235: 支付接口对接</div>
                <div class="task-desc">对接新的支付网关</div>
                <span class="task-status status-pending">待开始</span>
            `, 'pending');

            addTask('dev', `
                <div class="task-title">JIRA-1236: Dashboard 性能优化</div>
                <div class="task-desc">减少首页加载时间</div>
                <span class="task-status status-pending">待开始</span>
            `, 'pending');

            await sleep(2000);

            // 开发者A 开始第一个任务
            addTimeline('dev', '选择 JIRA-1234，要求 Bot 生成技术规范');
            await sleep(1500);

            updateTask('dev', 0, `
                <div class="task-title">JIRA-1234: 用户登录优化</div>
                <div class="task-desc">Bot 正在生成技术规范...</div>
                <span class="task-status status-inprogress">进行中</span>
            `, 'inprogress');

            addTimeline('bot', '拉取代码分支 feature/JIRA-1234');
            await sleep(2000);
            addTimeline('bot', '生成技术规范文档（Spec）');
            await sleep(2500);

            updateTask('dev', 0, `
                <div class="task-title">JIRA-1234: 用户登录优化</div>
                <div class="task-desc">✅ 技术规范已生成，等待Review</div>
                <span class="task-status status-inprogress">等待审核</span>
            `, 'inprogress');

            await sleep(1500);
            addTimeline('dev', '审核技术规范，批准开始开发');
            await sleep(1000);

            updateTask('dev', 0, `
                <div class="task-title">JIRA-1234: 用户登录优化</div>
                <div class="task-desc">🤖 Bot 正在编码... (25分钟)</div>
                <span class="task-status status-inprogress">开发中</span>
            `, 'inprogress');

            addTimeline('bot', '开始开发 JIRA-1234');

            // 并行：开发者A 同时启动第二个任务
            await sleep(2000);
            addTimeline('dev', '同时启动 JIRA-1235（支付接口）');
            await sleep(1000);

            updateTask('dev', 1, `
                <div class="task-title">JIRA-1235: 支付接口对接</div>
                <div class="task-desc">Bot 正在生成技术规范...</div>
                <span class="task-status status-inprogress">进行中</span>
            `, 'inprogress');

            addTimeline('bot', '并行生成 JIRA-1235 技术规范');
            await sleep(2500);

            updateTask('dev', 1, `
                <div class="task-title">JIRA-1235: 支付接口对接</div>
                <div class="task-desc">✅ 技术规范已生成</div>
                <span class="task-status status-inprogress">等待审核</span>
            `, 'inprogress');

            await sleep(1500);
            addTimeline('dev', '批准 JIRA-1235，Bot 开始并行开发');

            updateTask('dev', 1, `
                <div class="task-title">JIRA-1235: 支付接口对接</div>
                <div class="task-desc">🤖 Bot 正在编码... (30分钟)</div>
                <span class="task-status status-inprogress">开发中</span>
            `, 'inprogress');

            addTimeline('bot', '并行开发 JIRA-1235');

            // 第一个任务完成
            await sleep(3000);
            addTimeline('bot', 'JIRA-1234 开发完成，自动代码审查');

            updateTask('dev', 0, `
                <div class="task-title">JIRA-1234: 用户登录优化</div>
                <div class="task-desc">✅ 开发完成，Code Review通过</div>
                <span class="task-status status-completed">已完成开发</span>
            `, 'completed');

            await sleep(1500);
            addTimeline('dev', '审核 JIRA-1234 代码，批准进入测试');
            await sleep(1000);

            // 自动创建测试环境，通知测试工程师B
            addTimeline('bot', '创建 JIRA-1234 测试环境');
            await sleep(1500);

            addTask('test', `
                <div class="task-title">测试任务: JIRA-1234</div>
                <div class="task-desc">✅ 测试环境已就绪<br>URL: https://test-1234.staging.com</div>
                <span class="task-status status-pending">待测试</span>
            `, 'pending');

            addTimeline('test', '收到 JIRA-1234 测试任务');
            await sleep(2000);

            updateTask('test', 0, `
                <div class="task-title">测试任务: JIRA-1234</div>
                <div class="task-desc">审核测试用例，批准自动化测试</div>
                <span class="task-status status-inprogress">测试中</span>
            `, 'inprogress');

            addTimeline('test', '审核测试用例，启动自动化测试');
            await sleep(2500);
            addTimeline('bot', '执行 JIRA-1234 自动化测试');
            await sleep(2500);

            updateTask('test', 0, `
                <div class="task-title">测试任务: JIRA-1234</div>
                <div class="task-desc">✅ 测试通过 (18/18 cases)<br>性能: 登录响应 < 200ms</div>
                <span class="task-status status-completed">测试完成</span>
            `, 'completed');

            addTimeline('test', 'JIRA-1234 测试完成，通知发布');

            // 通知发布人员C
            await sleep(1500);
            addTask('deploy', `
                <div class="task-title">发布任务: JIRA-1234</div>
                <div class="task-desc">✅ 已通过测试，准备发布到生产环境</div>
                <span class="task-status status-pending">待发布</span>
            `, 'pending');

            addTimeline('deploy', '收到 JIRA-1234 发布任务');
            await sleep(2000);

            updateTask('deploy', 0, `
                <div class="task-title">发布任务: JIRA-1234</div>
                <div class="task-desc">正在发布到生产环境...</div>
                <span class="task-status status-inprogress">发布中</span>
            `, 'inprogress');

            addTimeline('deploy', '开始发布 JIRA-1234');
            await sleep(3000);

            updateTask('deploy', 0, `
                <div class="task-title">发布任务: JIRA-1234</div>
                <div class="task-desc">🎉 发布成功！版本 v1.2.3</div>
                <span class="task-status status-completed">已发布</span>
            `, 'completed');

            addTimeline('deploy', '✅ JIRA-1234 发布成功');

            // 第二个任务也完成
            await sleep(2000);
            addTimeline('bot', 'JIRA-1235 开发完成，自动代码审查');

            updateTask('dev', 1, `
                <div class="task-title">JIRA-1235: 支付接口对接</div>
                <div class="task-desc">✅ 开发完成，Code Review通过</div>
                <span class="task-status status-completed">已完成开发</span>
            `, 'completed');

            await sleep(1500);
            addTimeline('bot', '创建 JIRA-1235 测试环境');
            await sleep(1500);

            addTask('test', `
                <div class="task-title">测试任务: JIRA-1235</div>
                <div class="task-desc">✅ 测试环境已就绪</div>
                <span class="task-status status-pending">待测试</span>
            `, 'pending');

            addTimeline('test', '收到 JIRA-1235 测试任务');
            await sleep(2000);

            updateTask('test', 1, `
                <div class="task-title">测试任务: JIRA-1235</div>
                <div class="task-desc">🤖 自动化测试进行中...</div>
                <span class="task-status status-inprogress">测试中</span>
            `, 'inprogress');

            addTimeline('bot', '执行 JIRA-1235 自动化测试');
            await sleep(2500);

            updateTask('test', 1, `
                <div class="task-title">测试任务: JIRA-1235</div>
                <div class="task-desc">✅ 测试通过 (25/25 cases)</div>
                <span class="task-status status-completed">测试完成</span>
            `, 'completed');

            addTimeline('test', 'JIRA-1235 测试完成');

            await sleep(1500);
            addTask('deploy', `
                <div class="task-title">发布任务: JIRA-1235</div>
                <div class="task-desc">✅ 准备发布</div>
                <span class="task-status status-pending">待发布</span>
            `, 'pending');

            addTimeline('deploy', '收到 JIRA-1235 发布任务');
            await sleep(2000);

            updateTask('deploy', 1, `
                <div class="task-title">发布任务: JIRA-1235</div>
                <div class="task-desc">正在发布...</div>
                <span class="task-status status-inprogress">发布中</span>
            `, 'inprogress');

            addTimeline('deploy', '开始发布 JIRA-1235');
            await sleep(3000);

            updateTask('deploy', 1, `
                <div class="task-title">发布任务: JIRA-1235</div>
                <div class="task-desc">🎉 发布成功！</div>
                <span class="task-status status-completed">已发布</span>
            `, 'completed');

            addTimeline('deploy', '✅ JIRA-1235 发布成功');

            await sleep(1500);
            addTimeline('bot', '🎉 所有任务完成！共处理 2 个并行任务');

            demoRunning = false;
        }

        function startDemo() {
            if (demoRunning) return;
            demoRunning = true;
            document.querySelector('.btn-start').disabled = true;
            runWorkflow();
        }

        function resetDemo() {
            location.reload();
        }
    </script>
</body>
</html>
